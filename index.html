<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Daring Stickman">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<title>Daring Stickman</title>
<style>
  @font-face { font-family: 'Gothica'; src: url('Gothica-Book.ttf') format('truetype'); font-weight: normal; }
  @font-face { font-family: 'Gothica'; src: url('Gothica-Bold.ttf') format('truetype'); font-weight: bold; }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 100%; height: 100%; background: #fff; overflow: hidden; font-family: 'Gothica', Gothica, monospace; }
  canvas { display: block; position: fixed; top: 0; left: 0; width: 100%; height: 100%; }
  #rotate-msg {
    display: none;
    position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
    background: #fff; z-index: 9999;
    flex-direction: column; align-items: center; justify-content: center;
    font-family: 'Gothica', monospace; text-align: center; padding: 40px;
  }
  #rotate-msg span { font-size: 48px; margin-bottom: 20px; }
  #rotate-msg p { font-size: 18px; color: #000; font-weight: bold; }
  @media screen and (max-width: 768px) and (orientation: portrait) {
    #rotate-msg { display: flex !important; }
    canvas { visibility: hidden !important; }
  }
</style>
</head>
<body>
<div id="rotate-msg">
  <span>&#x21BB;</span>
  <p>Rotate your phone to play</p>
</div>
<canvas id="c"></canvas>
<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');

let gameReady = false;
function resize() {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
  if (gameReady) {
    trampoline.y = canvas.height * 0.85;
  }
}
resize();
window.addEventListener('resize', resize);
window.addEventListener('orientationchange', () => { setTimeout(resize, 100); setTimeout(resize, 300); });

// --- Audio ---
const sounds = {
  bounce: new Audio('bounce.mp3'),
  death1: new Audio('death1.mp3'),
  death2: new Audio('death2.mp3'),
  death3: new Audio('death3.mp3'),
  wind: new Audio('wind.mp3'),
  ding: new Audio('ding.mp3'),
  boing: new Audio('boing.mp3'),
  upgrade: new Audio('upgrade.mp3'),
  music: new Audio('music.mp3'),
};
sounds.music.loop = true;
sounds.music.volume = 0.3;
sounds.wind.loop = true;
sounds.wind.volume = 0.6;
// Preload all
for (const s of Object.values(sounds)) { s.preload = 'auto'; s.load(); }

// Web Audio API for low-latency SFX on mobile
let sfxCtx = null;
const sfxBuffers = {};
let audioUnlocked = false;

function initSfxContext() {
  if (sfxCtx) return;
  sfxCtx = new (window.AudioContext || window.webkitAudioContext)();
}

function loadSfxBuffer(name) {
  if (sfxBuffers[name] || !sfxCtx) return;
  sfxBuffers[name] = 'loading';
  fetch(sounds[name].src)
    .then(r => r.arrayBuffer())
    .then(buf => sfxCtx.decodeAudioData(buf))
    .then(decoded => { sfxBuffers[name] = decoded; })
    .catch(() => { sfxBuffers[name] = null; });
}

function unlockAudio() {
  if (audioUnlocked) return;
  audioUnlocked = true;
  initSfxContext();
  if (sfxCtx && sfxCtx.state === 'suspended') sfxCtx.resume();
  // Load all SFX buffers
  for (const name of Object.keys(sounds)) {
    if (name !== 'music' && name !== 'wind') loadSfxBuffer(name);
  }
}

function playSound(name, volume = 1) {
  if (!sfxCtx || !sfxBuffers[name] || sfxBuffers[name] === 'loading') return;
  const sfxVol = settings.sfxVolume !== undefined ? settings.sfxVolume : 1;
  const source = sfxCtx.createBufferSource();
  const gain = sfxCtx.createGain();
  source.buffer = sfxBuffers[name];
  gain.gain.value = Math.min(1, volume * sfxVol);
  source.connect(gain);
  gain.connect(sfxCtx.destination);
  source.start();
}

function playDeathSound() {
  const pick = ['death1', 'death2', 'death3'][Math.floor(Math.random() * 3)];
  playSound(pick, 0.8);
  playThud();
}

function playThud() {
  initSfxContext();
  const ctx = sfxCtx;
  if (ctx.state === 'suspended') ctx.resume();
  const osc = ctx.createOscillator();
  const gain = ctx.createGain();
  osc.type = 'sine';
  osc.frequency.setValueAtTime(80, ctx.currentTime);
  osc.frequency.exponentialRampToValueAtTime(30, ctx.currentTime + 0.15);
  gain.gain.setValueAtTime(0.7, ctx.currentTime);
  gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.25);
  osc.connect(gain);
  gain.connect(ctx.destination);
  osc.start();
  osc.stop(ctx.currentTime + 0.25);
}

function startWind() {
  sounds.wind.currentTime = 0;
  sounds.wind.volume = 0.6;
  sounds.wind.play().catch(() => {});
}

function fadeOutWind() {
  const w = sounds.wind;
  if (w.paused) return;
  let vol = w.volume;
  const fade = setInterval(() => {
    vol -= 0.05;
    if (vol <= 0) { w.pause(); w.volume = 0.6; clearInterval(fade); }
    else w.volume = vol;
  }, 30);
}

// --- Synthesized death ringing (Web Audio API) ---
let deathRingCtx = null;
let deathRingOsc = null;
let deathRingGain = null;

function startDeathRing() {
  initSfxContext();
  deathRingCtx = sfxCtx;
  if (!deathRingCtx) return;
  if (deathRingCtx.state === 'suspended') deathRingCtx.resume();
  stopDeathRing();

  const osc = deathRingCtx.createOscillator();
  const gain = deathRingCtx.createGain();
  // Second oscillator for dissonant beating
  const osc2 = deathRingCtx.createOscillator();
  const gain2 = deathRingCtx.createGain();

  osc.type = 'sine';
  osc.frequency.value = 800;
  osc2.type = 'sine';
  osc2.frequency.value = 803; // slight detune for eerie beating

  gain.gain.value = 0;
  gain2.gain.value = 0;

  osc.connect(gain);
  osc2.connect(gain2);
  gain.connect(deathRingCtx.destination);
  gain2.connect(deathRingCtx.destination);

  osc.start();
  osc2.start();

  deathRingOsc = [osc, osc2];
  deathRingGain = [gain, gain2];
}

function updateDeathRing(buildupT) {
  // buildupT goes from 0 to 1 over the buildup
  if (!deathRingGain) return;
  const vol = buildupT * buildupT * 0.45;
  // Pitch rises from 800Hz to 2000Hz
  const freq = 800 + buildupT * buildupT * 1200;
  for (const g of deathRingGain) g.gain.value = vol;
  if (deathRingOsc) {
    deathRingOsc[0].frequency.value = freq;
    deathRingOsc[1].frequency.value = freq + 3 + buildupT * 15; // wider beating as it builds
  }
}

function stopDeathRing() {
  if (deathRingOsc) {
    for (const o of deathRingOsc) { try { o.stop(); } catch(e) {} }
    deathRingOsc = null;
  }
  deathRingGain = null;
}

function initAudio() {} // no-op, sounds preloaded via Audio elements

// --- Settings (persisted to localStorage) ---
const DEFAULT_SETTINGS = {
  username: '',
  thickness: 4,      // line width 2-8
  stiffness: 0.45,   // constraint stiffness 0.2-0.8
  faceStyle: 'dots',  // 'dots', 'cool', 'happy', 'angry'
  vignetteStrength: 1.0, // 0-2 multiplier
  musicVolume: 0.3,
  sfxVolume: 1.0,
};
let settings = { ...DEFAULT_SETTINGS };
function loadSettings() {
  try {
    const s = JSON.parse(localStorage.getItem('ds_settings'));
    if (s) settings = { ...DEFAULT_SETTINGS, ...s };
  } catch(e) {}
  // Load high score
  try { highScore = parseInt(localStorage.getItem('ds_highscore')) || 0; } catch(e) {}
  // Load username
  try {
    const u = localStorage.getItem('ds_username');
    if (u) settings.username = u;
  } catch(e) {}
  applySettings();
}
function saveSettings() {
  try {
    localStorage.setItem('ds_settings', JSON.stringify(settings));
    localStorage.setItem('ds_username', settings.username);
  } catch(e) {}
  applySettings();
}
function saveHighScore() {
  try { localStorage.setItem('ds_highscore', highScore.toString()); } catch(e) {}
}
function applySettings() {
  sounds.music.volume = settings.musicVolume;
}

// --- Online Leaderboard ---
const API_URL = 'https://daring-stickman.netlify.app/api/scores';
let leaderboard = [];
let leaderboardLoading = false;
let onlineRank = null;

function loadLeaderboard() {
  // Load cached first
  try { leaderboard = JSON.parse(localStorage.getItem('ds_leaderboard')) || []; } catch(e) { leaderboard = []; }
  // Then fetch online
  fetchLeaderboard();
}

function fetchLeaderboard() {
  leaderboardLoading = true;
  fetch(API_URL).then(r => r.json()).then(data => {
    if (Array.isArray(data) && data.length > 0) {
      leaderboard = data;
      try { localStorage.setItem('ds_leaderboard', JSON.stringify(data)); } catch(e) {}
    }
    leaderboardLoading = false;
  }).catch(() => { leaderboardLoading = false; });
}

function addToLeaderboard(name, sc) {
  const entry = { name: (name || 'Anonymous').slice(0, 20), score: sc, date: Date.now() };
  // Update local immediately
  leaderboard.push(entry);
  leaderboard.sort((a, b) => b.score - a.score);
  leaderboard = leaderboard.slice(0, 100);
  try { localStorage.setItem('ds_leaderboard', JSON.stringify(leaderboard)); } catch(e) {}
  // Submit online
  fetch(API_URL, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ name: entry.name, score: sc }),
  }).then(r => r.json()).then(data => {
    if (data.rank) onlineRank = data.rank;
    fetchLeaderboard(); // refresh with server data
  }).catch(() => {});
}

// --- Share ---
function shareScore(sc) {
  const text = `I scored ${sc} in Daring Stickman! Can you beat me?`;
  if (navigator.share) {
    navigator.share({ title: 'Daring Stickman', text }).catch(() => {});
  } else {
    navigator.clipboard.writeText(text).then(() => {
      notify('Copied to clipboard!', '#000', 90);
    }).catch(() => {});
  }
}

// --- Game State ---
const MOBILE = 'ontouchstart' in window || navigator.maxTouchPoints > 0;
let gravity = MOBILE ? 0.2 : 0.25;
let baseGravity = gravity;
const MAX_GRAVITY = MOBILE ? 0.4 : 0.55;
const SUBSTEPS = 6;
const FLOOR_Y = () => canvas.height * 0.97;

let score = 0;
let highScore = 0;
let bounceCount = 0;
let combo = 0;
let comboTimer = 0;
// States: 'menu', 'intro', 'playing', 'dying', 'gameover', 'settings', 'leaderboard'
let gameState = 'menu';
let menuState = 'main'; // 'main', 'settings', 'leaderboard'
let settingsScroll = 0;
let newPersonalBest = false;
let deathTimer = 0;
const DEATH_BUILDUP = 180; // 3s buildup
const DEATH_EXPLODE = 40;  // 0.67s explosion
const DEATH_LINGER = 80;   // 1.3s linger
const DEATH_TOTAL = DEATH_BUILDUP + DEATH_EXPLODE + DEATH_LINGER;
let dyingRagdoll = null;
let deathX = 0, deathY = 0;
let introTimer = 0;
const INTRO_DURATION = 240; // 4 seconds at 60fps
let introClouds = [];
let cloudFadeTimer = 0;
let introCameraY = 0;
let screenShake = 0;
let particles = [];
let notifications = [];
let splatters = []; // persistent screen splatters from death
let gibs = [];     // flying limb pieces from death
let powerups = [];
let activePowerups = [];
let lastPowerupTime = 0;
let frameCount = 0;
let scoreMultiplier = 1;
let hazards = [];
let lastHazardTime = 0;
let vignetteIntensity = 0;
let vignetteBase = 0; // grows with difficulty

// Menu button hit-testing
let menuButtons = [];
function addButton(label, x, y, w, h, action) {
  menuButtons.push({ label, x: x - w/2, y: y - h/2, w, h, action });
  // Draw it
  ctx.fillStyle = '#000';
  ctx.fillRect(x - w/2, y - h/2, w, h);
  ctx.fillStyle = '#fff'; ctx.font = `bold ${Math.floor(h * 0.4)}px Gothica, monospace`;
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.fillText(label, x, y);
  ctx.textBaseline = 'alphabetic';
}
function addButtonOutline(label, x, y, w, h, action) {
  menuButtons.push({ label, x: x - w/2, y: y - h/2, w, h, action });
  ctx.strokeStyle = '#000'; ctx.lineWidth = 2;
  ctx.strokeRect(x - w/2, y - h/2, w, h);
  ctx.fillStyle = '#000'; ctx.font = `bold ${Math.floor(h * 0.4)}px Gothica, monospace`;
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.fillText(label, x, y);
  ctx.textBaseline = 'alphabetic';
}

// Settings slider helper
let activeSlider = null;
let settingsInputActive = false;
function drawSlider(label, x, y, w, value, min, max, key) {
  const h = 36;
  const labelW = 80;
  // Label on left
  ctx.fillStyle = '#000'; ctx.font = '12px Gothica, monospace'; ctx.textAlign = 'right';
  ctx.fillText(label, x + labelW - 8, y + 5);
  // Track
  const tx = x + labelW;
  const tw = w - labelW - 40;
  ctx.fillStyle = '#ddd';
  ctx.fillRect(tx, y, tw, 4);
  // Fill
  const pct = (value - min) / (max - min);
  ctx.fillStyle = '#000';
  ctx.fillRect(tx, y, tw * pct, 4);
  // Handle
  const hx = tx + tw * pct;
  ctx.beginPath();
  ctx.arc(hx, y + 2, 8, 0, Math.PI * 2);
  ctx.fill();
  // Value text on right
  ctx.fillStyle = '#999'; ctx.font = '11px Gothica, monospace'; ctx.textAlign = 'left';
  ctx.fillText(typeof value === 'number' ? value.toFixed(value % 1 ? 2 : 0) : value, tx + tw + 10, y + 5);
  // Register slider area for hit testing
  menuButtons.push({ label: key, x: tx - 10, y: y - 12, w: tw + 20, h, isSlider: true, min, max, key, trackX: tx, trackW: tw });
}

loadSettings();
loadLeaderboard();

// --- Trampoline ---
const trampoline = {
  x: 0, y: 0, width: 120, height: 14, defaultWidth: 120,
  targetX: 0, flex: 0, flexVel: 0, color: '#e94560',

  init() {
    this.x = canvas.width / 2;
    this.y = canvas.height * 0.85;
    this.targetX = this.x;
    const bw = MOBILE ? Math.min(100, canvas.width * 0.14) : Math.min(180, canvas.width * 0.14);
    this.width = bw;
    this.defaultWidth = bw;
  },

  update() {
    const followSpeed = (controlMode === 'tilt') ? 0.1 : 0.15;
    this.x += (this.targetX - this.x) * followSpeed;
    const hw = this.width / 2;
    if (this.x < hw) this.x = hw;
    if (this.x > canvas.width - hw) this.x = canvas.width - hw;
    this.flexVel += -this.flex * 0.3;
    this.flexVel *= 0.7;
    this.flex += this.flexVel;
  },

  draw() {
    const hw = this.width / 2;
    const left = this.x - hw;
    const right = this.x + hw;
    const y = this.y;

    // Legs
    ctx.strokeStyle = '#000';
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.moveTo(left + 15, y + 5);
    ctx.lineTo(left + 25, y + 35);
    ctx.moveTo(right - 15, y + 5);
    ctx.lineTo(right - 25, y + 35);
    ctx.stroke();

    // Surface
    ctx.beginPath();
    ctx.moveTo(left, y);
    ctx.quadraticCurveTo(this.x, y + this.flex, right, y);
    ctx.strokeStyle = '#000';
    ctx.lineWidth = 4;
    ctx.stroke();

    // End caps
    ctx.fillStyle = '#000';
    ctx.beginPath(); ctx.arc(left, y, 3, 0, Math.PI * 2); ctx.fill();
    ctx.beginPath(); ctx.arc(right, y, 3, 0, Math.PI * 2); ctx.fill();
  },
};

// ==========================================================
// RAGDOLL: head is a bouncy ball, body trails behind
// ==========================================================

// A simple verlet point for the body chain
class ChainPoint {
  constructor(x, y) {
    this.x = x; this.y = y;
    this.ox = x; this.oy = y;
  }
  update() {
    const vx = (this.x - this.ox) * 0.98;
    const vy = (this.y - this.oy) * 0.98;
    this.ox = this.x; this.oy = this.y;
    this.x += vx;
    this.y += vy + gravity * 0.5; // body has less gravity than head
  }
}

function createRagdoll(startX, startY, scale = 1) {
  const s = v => v * scale;

  // HEAD: the main physics ball — perfectly elastic, zero drag
  const head = {
    x: startX, y: startY,
    ox: startX, oy: startY,
    radius: s(14),
    update() {
      const vx = this.x - this.ox;
      const vy = this.y - this.oy;
      this.ox = this.x; this.oy = this.y;
      this.x += vx;
      this.y += vy + gravity;
    }
  };

  // BODY: chain of points hanging off the head
  // neck, torso, hip + limbs branching off
  const neck    = new ChainPoint(startX, startY + s(14));
  const hip     = new ChainPoint(startX, startY + s(50));
  const lElbow  = new ChainPoint(startX - s(25), startY + s(35));
  const lHand   = new ChainPoint(startX - s(45), startY + s(55));
  const rElbow  = new ChainPoint(startX + s(25), startY + s(35));
  const rHand   = new ChainPoint(startX + s(45), startY + s(55));
  const lKnee   = new ChainPoint(startX - s(10), startY + s(110));
  const lFoot   = new ChainPoint(startX - s(12), startY + s(145));
  const rKnee   = new ChainPoint(startX + s(10), startY + s(110));
  const rFoot   = new ChainPoint(startX + s(12), startY + s(145));

  const bodyPoints = [neck, hip, lElbow, lHand, rElbow, rHand, lKnee, lFoot, rKnee, rFoot];

  // Links: [pointA, pointB, restLength]
  const links = [
    [neck, hip, s(38)],
    // arms
    [neck, lElbow, s(28)],
    [lElbow, lHand, s(25)],
    [neck, rElbow, s(28)],
    [rElbow, rHand, s(25)],
    // legs
    [hip, lKnee, s(35)],
    [lKnee, lFoot, s(35)],
    [hip, rKnee, s(35)],
    [rKnee, rFoot, s(35)],
  ];

  // Drawing segments (same as links, these are the visible ones)
  const drawLinks = links.slice();

  // Cross braces for stability (not drawn)
  links.push([lElbow, rElbow, s(20)]);
  links.push([lKnee, rKnee, s(20)]);

  return {
    head, bodyPoints, links, drawLinks, scale,
    alive: true, lastBounceFrame: 0,
    neckRestLen: s(14),
    color: '#e94560',
  };
}

const RAGDOLL_COLORS = ['#e94560', '#16c79a', '#f5a623', '#9b59b6', '#3498db', '#e67e22'];
let ragdolls = [];

function spawnRagdoll(x, y, scale) {
  const defaultScale = MOBILE ? 0.7 : 1;
  const r = createRagdoll(x || canvas.width / 2, y || canvas.height / 3, scale || defaultScale);
  r.color = RAGDOLL_COLORS[ragdolls.length % RAGDOLL_COLORS.length];
  ragdolls.push(r);
}

function spawnExtraRagdoll() {
  // Spawn just above the trampoline, falling gently
  const x = trampoline.x + (Math.random() - 0.5) * 80;
  const spawnY = trampoline.y - 200;
  const r = createRagdoll(x, spawnY, 1);
  r.color = RAGDOLL_COLORS[ragdolls.length % RAGDOLL_COLORS.length];
  ragdolls.push(r);
}

// --- Resolve a distance constraint between two objects (point-like with .x .y) ---
function solveLink(a, b, len, stiffness = 0.5) {
  const dx = b.x - a.x;
  const dy = b.y - a.y;
  const dist = Math.hypot(dx, dy);
  if (dist === 0) return;
  const diff = (len - dist) / dist * stiffness;
  const ox = dx * diff;
  const oy = dy * diff;
  a.x -= ox; a.y -= oy;
  b.x += ox; b.y += oy;
}

// --- Physics step for one ragdoll ---
function updateRagdoll(r) {
  if (!r.alive) return;

  // Update head (the ball)
  r.head.update();

  // Update body chain
  for (const p of r.bodyPoints) p.update();

  // Solve constraints
  for (let iter = 0; iter < SUBSTEPS; iter++) {
    // Head-to-neck link: neck follows head, head is NEVER affected
    const neck = r.bodyPoints[0];
    const dx = neck.x - r.head.x;
    const dy = neck.y - r.head.y;
    const dist = Math.hypot(dx, dy);
    if (dist > 0) {
      const target = r.neckRestLen;
      const diff = (target - dist) / dist;
      // 100% on neck — head is immovable anchor for this constraint
      neck.x += dx * diff;
      neck.y += dy * diff;
    }

    // Body links
    for (const [a, b, len] of r.links) {
      solveLink(a, b, len, settings.stiffness);
    }

    // Constrain body points to screen (walls + ceiling, NOT floor — floor = death)
    for (const p of r.bodyPoints) {
      if (p.y < 5) { p.y = 5; p.oy = p.y; }
      if (p.x < 5) { p.x = 5; p.ox = p.x; }
      if (p.x > canvas.width - 5) { p.x = canvas.width - 5; p.ox = p.x; }
    }

    // Head wall/ceiling constraints
    const h = r.head;
    const hr = h.radius;
    if (h.y < hr) { const vel = h.y - h.oy; h.y = hr; h.oy = h.y + vel; }
    // Walls: soft bounce off edges
    if (h.x < hr) { const vx = h.x - h.ox; h.x = hr; h.ox = h.x + vx * 0.5; }
    if (h.x > canvas.width - hr) { const vx = h.x - h.ox; h.x = canvas.width - hr; h.ox = h.x + vx * 0.5; }
  }
}

// --- Bounce Detection ---
function checkBounce(r) {
  if (!r.alive) return;
  const h = r.head;
  const vy = h.y - h.oy;

  // Only bounce if head is moving downward
  if (vy <= 0) return;

  const hw = trampoline.width / 2;
  if (h.x > trampoline.x - hw && h.x < trampoline.x + hw &&
      h.y + h.radius > trampoline.y - 5 && h.y < trampoline.y + 25) {

    // Where on the trampoline? -1 (left edge) to 1 (right edge)
    const offset = (h.x - trampoline.x) / hw;
    const absOffset = Math.abs(offset);
    const isPerfect = absOffset < 0.3;

    // BOUNCE!
    h.y = trampoline.y - h.radius - 2;

    const isSuperBounce = activePowerups.some(ap => ap.type.id === 'super_bounce');
    const minVel = isSuperBounce ? (MOBILE ? 10 : 15) : (MOBILE ? 8 : 12);
    // On the very first bounce, clamp to minVel to reset intro velocity
    const rawVel = bounceCount === 0 ? minVel : Math.max(minVel, Math.abs(vy));
    const maxVel = MOBILE ? 14 : 25;
    const launchVel = Math.min(rawVel, maxVel);
    h.oy = h.y + launchVel;

    // First bounce: also reset body point velocities
    if (bounceCount === 0) {
      h.ox = h.x;
      for (const p of r.bodyPoints) {
        p.ox = p.x;
        p.oy = p.y;
      }
    }

    // Hit right side → bounce right, hit left → bounce left
    const directionKick = offset * launchVel * 0.15;
    const jitter = (Math.random() - 0.5) * 0.8;
    // Trampoline movement adds a subtle nudge
    const trampVel = trampoline.targetX - trampoline.x;
    const trampKick = trampVel * 0.1;
    h.ox = h.x - directionKick - jitter - trampKick;

    if (frameCount - r.lastBounceFrame > 8) {
      r.lastBounceFrame = frameCount;
      bounceCount++;

      // Ramp gravity slowly over time — subtle at first, creeps up
      if (!activePowerups.some(ap => ap.type.id === 'gravity_up' || ap.type.id === 'gravity_down')) {
        const startG = MOBILE ? 0.2 : 0.25;
        const ramp = MOBILE ? 0.0008 : 0.0015;
        baseGravity = Math.min(MAX_GRAVITY, startG + bounceCount * ramp);
        gravity = baseGravity;
      }

      // Combo on center-ish hits (within 30%), off-center just doesn't add
      if (isPerfect) {
        combo++;
        comboTimer = 150;
      } else {
        // Off-center doesn't reset, just doesn't build
        comboTimer = Math.max(comboTimer, 60);
      }

      const points = (10 + combo * 5) * scoreMultiplier;
      score += points;

      trampoline.flex = 18 + Math.min(launchVel, 15);
      screenShake = isPerfect ? 3 : 3 + absOffset * 3;
      spawnBounceParticles(h.x, trampoline.y);
      playSound('bounce', 0.5 + Math.min(launchVel / 20, 0.5));

      if (isPerfect) {
        const boingVol = Math.max(0.15, 0.7 - combo * 0.08);
        playSound('boing', boingVol);
      }
      if (isPerfect && combo > 1) {
        notify(`PERFECT! ${combo}x +${points}`, `hsl(${combo * 40}, 90%, 65%)`, 50);
      } else if (absOffset > 0.7) {
        notify('EDGE!', '#ff6b6b', 30);
      }
    }
  }
}

// --- Death Check ---
function checkDeath(r) {
  if (!r.alive || r.dying) return;
  const h = r.head;
  if (h.y + h.radius >= FLOOR_Y()) {
    h.y = FLOOR_Y() - h.radius;
    h.oy = h.y;
    // Freeze the ragdoll in place
    for (const p of r.bodyPoints) { p.ox = p.x; p.oy = p.y; }
    // Only the last surviving ragdoll gets the full death cinematic
    const aliveCount = ragdolls.filter(rd => rd.alive && !rd.dying).length;
    if (aliveCount <= 1) {
      triggerDeathCinematic(r);
    } else {
      // Clone: instant death, no cinematic
      r.alive = false;
      explodeRagdoll(r);
    }
  }
  // Limbs just get clamped at floor, don't trigger death
  for (const p of r.bodyPoints) {
    if (p.y >= FLOOR_Y()) {
      p.y = FLOOR_Y();
      p.oy = p.y;
    }
  }
}

function triggerDeathCinematic(r) {
  r.dying = true;
  dyingRagdoll = r;
  deathX = r.head.x;
  deathY = r.head.y;
  deathTimer = 0;
  gameState = 'dying';
}

function explodeRagdoll(r) {
  playDeathSound();
  const h = r.head;

  // Spawn gibs — each limb segment flies violently outward
  for (const [a, b] of r.drawLinks) {
    const mx = (a.x + b.x) / 2;
    const my = (a.y + b.y) / 2;
    const len = Math.hypot(b.x - a.x, b.y - a.y);
    const angle = Math.atan2(b.y - a.y, b.x - a.x);
    // Direction away from center of ragdoll
    const awayAngle = Math.atan2(my - h.y, mx - h.x);
    const power = 8 + Math.random() * 18;
    gibs.push({
      x: mx, y: my,
      vx: Math.cos(awayAngle) * power + (Math.random() - 0.5) * 8,
      vy: Math.sin(awayAngle) * power - Math.random() * 10 - 5,
      rotation: angle,
      rotSpeed: (Math.random() - 0.5) * 0.6,
      length: len,
      lineWidth: Math.max(3, 4 * r.scale),
      life: 1.5,
    });
  }

  // Head gib — flies up hard
  gibs.push({
    x: h.x, y: h.y,
    vx: (Math.random() - 0.5) * 15,
    vy: -Math.random() * 22 - 10,
    rotation: 0,
    rotSpeed: (Math.random() - 0.5) * 0.5,
    length: 0,
    radius: h.radius,
    lineWidth: 3,
    life: 1.5,
  });

  // Sludgy liquid particles — big, blobby, slower gravity
  for (let i = 0; i < 50; i++) {
    const angle = Math.random() * Math.PI * 2;
    const speed = 2 + Math.random() * 12;
    particles.push({
      x: h.x + (Math.random() - 0.5) * 20,
      y: h.y + (Math.random() - 0.5) * 20,
      vx: Math.cos(angle) * speed,
      vy: Math.sin(angle) * speed - 3,
      life: 2.0,
      color: '#000',
      size: 4 + Math.random() * 10,
      sludge: true,
    });
  }

  // Smaller splatter droplets
  for (let i = 0; i < 30; i++) {
    const angle = Math.random() * Math.PI * 2;
    const speed = 5 + Math.random() * 15;
    particles.push({
      x: h.x, y: h.y,
      vx: Math.cos(angle) * speed,
      vy: Math.sin(angle) * speed - 6,
      life: 1.2,
      color: '#000',
      size: 2 + Math.random() * 4,
      sludge: true,
    });
  }
}

function updateGibs() {
  for (let i = gibs.length - 1; i >= 0; i--) {
    const g = gibs[i];
    g.x += g.vx;
    g.y += g.vy;
    g.vy += 0.4; // gravity
    g.rotation += g.rotSpeed;
    g.life -= 0.008;

    // Splatter on walls/floor
    if (g.y > FLOOR_Y() && g.life > 0.3) {
      splatters.push({
        x: g.x, y: FLOOR_Y() - 2,
        size: 4 + Math.random() * 8,
        alpha: 0.6 + Math.random() * 0.3,
      });
      g.vy = -Math.abs(g.vy) * 0.3;
      g.vx *= 0.7;
      if (Math.abs(g.vy) < 1) g.life = Math.min(g.life, 0.3);
    }
    if (g.x < 0 || g.x > canvas.width) {
      splatters.push({
        x: Math.max(3, Math.min(canvas.width - 3, g.x)),
        y: g.y,
        size: 3 + Math.random() * 6,
        alpha: 0.4 + Math.random() * 0.3,
      });
      g.vx *= -0.3;
    }

    if (g.life <= 0) gibs.splice(i, 1);
  }
}

function drawGibs() {
  for (const g of gibs) {
    ctx.globalAlpha = Math.max(0, g.life);
    ctx.save();
    ctx.translate(g.x, g.y);
    ctx.rotate(g.rotation);
    if (g.length === 0) {
      // Head
      ctx.fillStyle = '#000';
      ctx.beginPath();
      ctx.arc(0, 0, g.radius, 0, Math.PI * 2);
      ctx.fill();
    } else {
      // Limb segment
      ctx.strokeStyle = '#000';
      ctx.lineWidth = g.lineWidth;
      ctx.lineCap = 'round';
      ctx.beginPath();
      ctx.moveTo(-g.length / 2, 0);
      ctx.lineTo(g.length / 2, 0);
      ctx.stroke();
    }
    ctx.restore();
  }
  ctx.globalAlpha = 1;
}

function drawSplatters() {
  for (const s of splatters) {
    ctx.globalAlpha = s.alpha;
    ctx.fillStyle = '#000';
    ctx.beginPath();
    ctx.arc(s.x, s.y, s.size, 0, Math.PI * 2);
    ctx.fill();
  }
  ctx.globalAlpha = 1;
}

// --- Draw Ragdoll ---
function drawRagdoll(r) {
  const { head: h, bodyPoints: bp, drawLinks, color, alive, scale } = r;

  if (!alive && !r.dying) return; // dead ragdolls are replaced by gibs

  const c = '#000';

  // Body lines
  ctx.strokeStyle = c;
  ctx.lineWidth = Math.max(2, settings.thickness * scale);
  ctx.lineCap = 'round';
  for (const [a, b] of drawLinks) {
    ctx.beginPath();
    ctx.moveTo(a.x, a.y);
    ctx.lineTo(b.x, b.y);
    ctx.stroke();
  }

  // Head circle
  ctx.beginPath();
  ctx.arc(h.x, h.y, h.radius, 0, Math.PI * 2);
  ctx.fillStyle = c;
  ctx.fill();

  // Eyes (white dots)
  const vx = h.x - h.ox;
  const vy = h.y - h.oy;
  const lookAngle = Math.atan2(vy, vx);
  const eyeR = h.radius * 0.15;
  const eyeOff = h.radius * 0.3;
  const lookX = Math.cos(lookAngle) * h.radius * 0.15;
  const lookY = Math.sin(lookAngle) * h.radius * 0.15;
  const perpX = -Math.sin(lookAngle);
  const perpY = Math.cos(lookAngle);

  if (alive) {
    const face = settings.faceStyle;
    const le = { x: h.x + perpX * eyeOff + lookX, y: h.y + perpY * eyeOff + lookY };
    const re = { x: h.x - perpX * eyeOff + lookX, y: h.y - perpY * eyeOff + lookY };
    ctx.fillStyle = '#fff';
    if (face === 'dots' || face === 'happy') {
      ctx.beginPath(); ctx.arc(le.x, le.y, eyeR, 0, Math.PI * 2); ctx.fill();
      ctx.beginPath(); ctx.arc(re.x, re.y, eyeR, 0, Math.PI * 2); ctx.fill();
    }
    if (face === 'cool') {
      // Sunglasses
      ctx.fillStyle = '#fff';
      const gw = eyeR * 3, gh = eyeR * 2;
      ctx.fillRect(le.x - gw/2, le.y - gh/2, gw, gh);
      ctx.fillRect(re.x - gw/2, re.y - gh/2, gw, gh);
      ctx.strokeStyle = '#fff'; ctx.lineWidth = 1;
      ctx.beginPath(); ctx.moveTo(le.x + gw/2, le.y); ctx.lineTo(re.x - gw/2, re.y); ctx.stroke();
    }
    if (face === 'angry') {
      ctx.beginPath(); ctx.arc(le.x, le.y, eyeR, 0, Math.PI * 2); ctx.fill();
      ctx.beginPath(); ctx.arc(re.x, re.y, eyeR, 0, Math.PI * 2); ctx.fill();
      // Angry eyebrows
      ctx.strokeStyle = '#fff'; ctx.lineWidth = 1.5;
      ctx.beginPath();
      ctx.moveTo(le.x - eyeR * 1.5, le.y - eyeR * 2.5);
      ctx.lineTo(le.x + eyeR * 1.5, le.y - eyeR * 1);
      ctx.stroke();
      ctx.beginPath();
      ctx.moveTo(re.x + eyeR * 1.5, re.y - eyeR * 2.5);
      ctx.lineTo(re.x - eyeR * 1.5, re.y - eyeR * 1);
      ctx.stroke();
    }
    if (face === 'happy') {
      // Smile
      ctx.strokeStyle = '#fff'; ctx.lineWidth = 1;
      const smileY = (le.y + re.y) / 2 + eyeR * 3;
      const smileX = (le.x + re.x) / 2;
      ctx.beginPath();
      ctx.arc(smileX, smileY - eyeR, eyeR * 2, 0.2, Math.PI - 0.2);
      ctx.stroke();
    }
  } else {
    ctx.strokeStyle = '#fff';
    ctx.lineWidth = 1.5;
    for (const dir of [-1, 1]) {
      const ex = h.x + perpX * eyeOff * dir;
      const ey = h.y + perpY * eyeOff * dir;
      const s = eyeR * 1.5;
      ctx.beginPath();
      ctx.moveTo(ex - s, ey - s); ctx.lineTo(ex + s, ey + s);
      ctx.moveTo(ex + s, ey - s); ctx.lineTo(ex - s, ey + s);
      ctx.stroke();
    }
  }

  ctx.globalAlpha = 1;
}

// --- Ragdoll-Ragdoll Collision ---
function resolveRagdollCollisions() {
  for (let i = 0; i < ragdolls.length; i++) {
    for (let j = i + 1; j < ragdolls.length; j++) {
      if (!ragdolls[i].alive || !ragdolls[j].alive) continue;
      // Head-head collision
      const a = ragdolls[i].head;
      const b = ragdolls[j].head;
      const dx = b.x - a.x;
      const dy = b.y - a.y;
      const dist = Math.hypot(dx, dy);
      const minD = a.radius + b.radius;
      if (dist < minD && dist > 0) {
        const diff = (minD - dist) / dist / 2;
        a.x -= dx * diff; a.y -= dy * diff;
        b.x += dx * diff; b.y += dy * diff;
      }
    }
  }
}

// --- Particles ---
function spawnParticles(x, y, color, count = 10) {
  for (let i = 0; i < count; i++) {
    particles.push({
      x, y, vx: (Math.random() - 0.5) * 8, vy: -Math.random() * 6 - 2,
      life: 1, color, size: Math.random() * 4 + 2,
    });
  }
}

function spawnBounceParticles(x, y) {
  for (let i = 0; i < 10; i++) {
    const angle = Math.PI + (Math.random() - 0.5) * 1.5;
    const speed = Math.random() * 4 + 1;
    particles.push({
      x, y, vx: Math.cos(angle) * speed, vy: Math.sin(angle) * speed - 2,
      life: 1, color: '#000', size: Math.random() * 2 + 1,
    });
  }
}

function updateParticles() {
  for (let i = particles.length - 1; i >= 0; i--) {
    const p = particles[i];
    if (p.sludge) {
      // Sludgy: slower gravity, more drag, leaves splatter trails
      p.x += p.vx; p.y += p.vy;
      p.vx *= 0.98; p.vy *= 0.98;
      p.vy += 0.25;
      p.life -= 0.012;
      // Leave splatters on floor/walls
      if (p.y > FLOOR_Y() - 2) {
        p.y = FLOOR_Y() - 2;
        p.vy = -Math.abs(p.vy) * 0.2;
        p.vx *= 0.5;
        splatters.push({ x: p.x, y: p.y, size: p.size * 0.8 + Math.random() * 3, alpha: 0.5 + Math.random() * 0.3 });
        if (Math.abs(p.vy) < 0.5) p.life = Math.min(p.life, 0.1);
      }
      if (p.x < 3 || p.x > canvas.width - 3) {
        splatters.push({ x: Math.max(3, Math.min(canvas.width - 3, p.x)), y: p.y, size: p.size * 0.6, alpha: 0.4 });
        p.vx *= -0.2;
      }
      // Drip trail
      if (Math.random() < 0.15 && p.life > 0.3) {
        splatters.push({ x: p.x, y: p.y, size: p.size * 0.3, alpha: 0.2 + Math.random() * 0.15 });
      }
    } else {
      p.x += p.vx; p.y += p.vy; p.vy += 0.15; p.life -= 0.02;
    }
    if (p.life <= 0) particles.splice(i, 1);
  }
}

function drawParticles() {
  for (const p of particles) {
    ctx.globalAlpha = Math.min(1, p.life);
    ctx.fillStyle = p.color;
    if (p.sludge) {
      // Sludgy: blobby, stretched in direction of motion
      const speed = Math.hypot(p.vx, p.vy);
      const stretch = Math.min(2, 1 + speed * 0.08);
      const angle = Math.atan2(p.vy, p.vx);
      ctx.save();
      ctx.translate(p.x, p.y);
      ctx.rotate(angle);
      ctx.scale(stretch, 1 / Math.sqrt(stretch));
      ctx.beginPath();
      ctx.arc(0, 0, p.size * Math.min(1, p.life + 0.3), 0, Math.PI * 2);
      ctx.fill();
      ctx.restore();
    } else {
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.size * p.life, 0, Math.PI * 2);
      ctx.fill();
    }
  }
  ctx.globalAlpha = 1;
}

// --- Notifications ---
function notify(text, color = '#000', duration = 90) {
  notifications.push({ text, color: '#000', life: duration, maxLife: duration, y: canvas.height / 3 });
}

function updateNotifications() {
  for (let i = notifications.length - 1; i >= 0; i--) {
    notifications[i].life--;
    notifications[i].y -= 0.5;
    if (notifications[i].life <= 0) notifications.splice(i, 1);
  }
}

function drawNotifications() {
  for (const n of notifications) {
    ctx.globalAlpha = Math.max(0, Math.min(1, n.life < 20 ? n.life / 20 : 1));
    ctx.fillStyle = n.color;
    ctx.font = 'bold 28px Gothica, monospace';
    ctx.textAlign = 'center';
    ctx.fillText(n.text, canvas.width / 2, n.y);
    ctx.globalAlpha = 1;
  }
}

// --- Powerups ---
const POWERUP_TYPES = [
  { id: 'gravity_up',   label: 'HEAVY! (2x)',      icon: '\u2B07', duration: 600, mult: 2, effect: () => { gravity = baseGravity * 1.8; scoreMultiplier = 2; }, undo: () => { gravity = baseGravity; scoreMultiplier = 1; } },
  { id: 'gravity_down', label: 'FLOATY!',           icon: '\u2B06', duration: 600, mult: 1, effect: () => { gravity = baseGravity * 0.4; }, undo: () => { gravity = baseGravity; } },
  { id: 'big',          label: 'BIG BOY!',          icon: '\u25CF', duration: 500, mult: 1, effect: () => { const bs = MOBILE ? 0.7 : 1; rescaleRagdolls(bs * 1.5); }, undo: () => { rescaleRagdolls(MOBILE ? 0.7 : 1); } },
  { id: 'small',        label: 'TINY! (2x)',        icon: '\u25CB', duration: 500, mult: 2, effect: () => { const bs = MOBILE ? 0.7 : 1; rescaleRagdolls(bs * 0.5); scoreMultiplier = 2; }, undo: () => { rescaleRagdolls(MOBILE ? 0.7 : 1); scoreMultiplier = 1; } },
  { id: 'extra',        label: '+1 STICK MAN!',     icon: '+',      duration: 0,   mult: 1, effect: () => { spawnExtraRagdoll(); }, undo: () => {} },
  { id: 'wide',         label: 'WIDE TRAMPOLINE!',  icon: '\u2194', duration: 500, mult: 1, effect: () => { trampoline.width = trampoline.defaultWidth * 1.6; }, undo: () => { trampoline.width = trampoline.defaultWidth; } },
  { id: 'narrow',       label: 'NARROW! (3x)',      icon: '\u2502', duration: 400, mult: 3, effect: () => { trampoline.width = trampoline.defaultWidth * 0.55; scoreMultiplier = 3; }, undo: () => { trampoline.width = trampoline.defaultWidth; scoreMultiplier = 1; } },
  { id: 'super_bounce', label: 'SUPER BOUNCE!',     icon: '\u2191', duration: 400, mult: 1, effect: () => {}, undo: () => {} },
];

function rescaleRagdolls(newScale) {
  for (const r of ragdolls) {
    if (!r.alive) continue;
    const ratio = newScale / r.scale;
    // Scale head
    r.head.radius *= ratio;
    r.neckRestLen *= ratio;
    // Scale body link lengths
    for (const link of r.links) {
      link[2] *= ratio;
    }
    for (const link of r.drawLinks) {
      link[2] *= ratio;
    }
    r.scale = newScale;
  }
}

function spawnPowerup() {
  const type = POWERUP_TYPES[Math.floor(Math.random() * POWERUP_TYPES.length)];
  powerups.push({ x: Math.random() * (canvas.width - 100) + 50, y: -30, vy: 1 + Math.random() * 1.5, type, size: 20, pulse: 0 });
}

function updatePowerups() {
  frameCount++;
  if (gameState === 'playing' && frameCount - lastPowerupTime > 300 + Math.random() * 300) {
    spawnPowerup();
    lastPowerupTime = frameCount;
  }
  for (let i = powerups.length - 1; i >= 0; i--) {
    const pu = powerups[i];
    pu.y += pu.vy; pu.pulse += 0.05;
    const hw = trampoline.width / 2;
    if (pu.y > trampoline.y - 20 && pu.y < trampoline.y + 10 &&
        pu.x > trampoline.x - hw && pu.x < trampoline.x + hw) {
      activatePowerup(pu.type);
      spawnParticles(pu.x, pu.y, '#000', 12);
      powerups.splice(i, 1); continue;
    }
    if (pu.y > canvas.height + 30) powerups.splice(i, 1);
  }
  for (let i = activePowerups.length - 1; i >= 0; i--) {
    activePowerups[i].timer--;
    if (activePowerups[i].timer <= 0) {
      activePowerups[i].type.undo();
      activePowerups.splice(i, 1);
    }
  }
}

function activatePowerup(type) {
  notify(type.label);
  screenShake = 10;
  for (let i = activePowerups.length - 1; i >= 0; i--) {
    if (activePowerups[i].type.id === type.id) {
      activePowerups[i].type.undo();
      activePowerups.splice(i, 1);
    }
  }
  type.effect();
  playSound('upgrade', 0.4);
  vignetteIntensity = Math.min(0.8, vignetteIntensity + 0.2);
  if (type.duration > 0) activePowerups.push({ type, timer: type.duration });
}

function drawPowerups() {
  for (const pu of powerups) {
    const pulse = 1 + Math.sin(pu.pulse) * 0.1;
    const size = pu.size * pulse;
    ctx.strokeStyle = '#000'; ctx.lineWidth = 2;
    ctx.beginPath(); ctx.roundRect(pu.x - size, pu.y - size, size * 2, size * 2, 4); ctx.stroke();
    ctx.fillStyle = '#000'; ctx.font = `bold ${size}px Gothica, monospace`;
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.fillText(pu.type.icon, pu.x, pu.y);
    ctx.textBaseline = 'alphabetic';
  }
}

function drawActivePowerups(startY) {
  let y = startY || 80; ctx.textAlign = 'left';
  for (const ap of activePowerups) {
    const pct = ap.timer / ap.type.duration;
    ctx.fillStyle = '#000'; ctx.font = '12px Gothica, monospace';
    ctx.fillText(ap.type.label, 15, y);
    ctx.fillStyle = '#ddd'; ctx.fillRect(15, y + 4, 100, 4);
    ctx.fillStyle = '#000'; ctx.fillRect(15, y + 4, 100 * pct, 4);
    y += 24;
  }
  ctx.textAlign = 'center';
}

// --- Hazards (spiky stars) ---

function spawnHazard() {
  hazards.push({
    x: Math.random() * (canvas.width - 80) + 40,
    y: -25,
    vy: 1.5 + Math.random() * 1.5,
    size: (MOBILE ? 10 : 15) + Math.random() * (MOBILE ? 5 : 8),
    rotation: Math.random() * Math.PI * 2,
    rotSpeed: (Math.random() - 0.5) * 0.08,
  });
}

function updateHazards() {
  // Spawn hazards — more frequent as game progresses
  const hazardInterval = MOBILE ? Math.max(90, 700 - bounceCount * 1.5) : Math.max(60, 500 - bounceCount * 2);
  if (gameState === 'playing' && frameCount - lastHazardTime > hazardInterval) {
    spawnHazard();
    lastHazardTime = frameCount;
  }

  for (let i = hazards.length - 1; i >= 0; i--) {
    const hz = hazards[i];
    hz.y += hz.vy;
    hz.rotation += hz.rotSpeed;

    // Check collision with ragdoll heads
    for (const r of ragdolls) {
      if (!r.alive || r.dying) continue;
      const dx = r.head.x - hz.x;
      const dy = r.head.y - hz.y;
      const dist = Math.hypot(dx, dy);
      if (dist < r.head.radius + hz.size * 0.7) {
        // Hit! Kill the ragdoll
        for (const p of r.bodyPoints) { p.ox = p.x; p.oy = p.y; }
        const aliveCount = ragdolls.filter(rd => rd.alive && !rd.dying).length;
        if (aliveCount <= 1) {
          triggerDeathCinematic(r);
        } else {
          r.alive = false;
          explodeRagdoll(r);
          playDeathSound();
        }
        notify('OUCH!');
        hazards.splice(i, 1);
        // Check game over
        if (ragdolls.every(rd => !rd.alive && !rd.dying)) {
          triggerGameOver();
        }
        break;
      }
    }

    // Remove if off screen
    if (hz.y > canvas.height + 30) hazards.splice(i, 1);
  }
}

function drawStar(x, y, size, points, rotation) {
  ctx.beginPath();
  for (let i = 0; i < points * 2; i++) {
    const angle = rotation + (i * Math.PI) / points;
    const r = i % 2 === 0 ? size : size * 0.4;
    const px = x + Math.cos(angle) * r;
    const py = y + Math.sin(angle) * r;
    if (i === 0) ctx.moveTo(px, py);
    else ctx.lineTo(px, py);
  }
  ctx.closePath();
}

function drawHazards() {
  for (const hz of hazards) {
    ctx.save();
    drawStar(hz.x, hz.y, hz.size, 6, hz.rotation);
    ctx.fillStyle = '#000';
    ctx.fill();
    ctx.restore();
  }
}

// --- Input ---
let inputX = 0;
let keys = {};
const isMobile = 'ontouchstart' in window || navigator.maxTouchPoints > 0;
let controlMode = 'mouse'; // 'mouse', 'touch', 'tilt'
let tiltEnabled = false;
let tiltGamma = 0; // left/right tilt in degrees
let tiltCalibration = 0; // baseline tilt angle

// Mouse
window.addEventListener('mousemove', (e) => { inputX = e.clientX; usingKeyboard = false; });

// Touch — move trampoline to finger position
window.addEventListener('touchmove', (e) => {
  e.preventDefault();
  inputX = e.touches[0].clientX;
  if (controlMode !== 'tilt') controlMode = 'touch';
}, { passive: false });
window.addEventListener('touchstart', (e) => {
  e.preventDefault();
  inputX = e.touches[0].clientX;
  handleInput(e);
}, { passive: false });

// Keyboard
window.addEventListener('keydown', (e) => {
  keys[e.key] = true;
  if (e.key === ' ' || e.key === 'Enter') handleInput(null);
});
window.addEventListener('keyup', (e) => { keys[e.key] = false; });
canvas.addEventListener('click', (e) => handleInput(e));

// Tilt (gyroscope)
function enableTilt() {
  if (typeof DeviceOrientationEvent !== 'undefined' &&
      typeof DeviceOrientationEvent.requestPermission === 'function') {
    // iOS 13+ requires permission
    DeviceOrientationEvent.requestPermission().then(state => {
      if (state === 'granted') {
        window.addEventListener('deviceorientation', handleTilt);
        tiltEnabled = true;
        controlMode = 'tilt';
        tiltCalibration = tiltGamma;
      }
    }).catch(() => {});
  } else {
    // Android / other — just listen
    window.addEventListener('deviceorientation', handleTilt);
    tiltEnabled = true;
    controlMode = 'tilt';
    setTimeout(() => { tiltCalibration = tiltGamma; }, 200);
  }
}

function handleTilt(e) {
  if (e.gamma !== null) {
    tiltGamma = e.gamma; // -90 to 90, 0 = flat
  }
}

let musicStarted = false;
function handleInput(e) {
  initAudio();
  unlockAudio();
  if (!musicStarted) {
    sounds.music.play().catch(() => {});
    musicStarted = true;
  }

  // Get click position
  let clickX, clickY;
  if (e && e.clientX !== undefined) { clickX = e.clientX; clickY = e.clientY; }
  else if (e && e.touches) { clickX = e.touches[0].clientX; clickY = e.touches[0].clientY; }

  // Check menu/gameover buttons
  if ((gameState === 'menu' || gameState === 'gameover') && clickX !== undefined) {
    for (const btn of menuButtons) {
      if (btn.isSlider) continue;
      if (clickX >= btn.x && clickX <= btn.x + btn.w &&
          clickY >= btn.y && clickY <= btn.y + btn.h) {
        if (btn.action) btn.action();
        return;
      }
    }
    // If in a sub-menu, don't fall through
    if (gameState === 'menu' && menuState !== 'main') return;
    if (gameState === 'gameover') return;
  }

  // Keyboard fallbacks (no click coords)
  if (gameState === 'menu' && menuState === 'main' && clickX === undefined) {
    if (isMobile && !tiltEnabled) enableTilt();
    startIntro();
    return;
  }
  if (gameState === 'gameover' && clickX === undefined) { restartGame(); return; }
  if (gameState === 'intro') { startGame(); }
  else if (gameState === 'dying') { skipDeathCinematic(); }
}

// Slider dragging
function handleMenuPointer(e) {
  if (gameState !== 'menu' || menuState !== 'settings') return;
  let px, py;
  if (e.touches) { px = e.touches[0].clientX; py = e.touches[0].clientY; }
  else { px = e.clientX; py = e.clientY; }

  // Check if we're on a slider
  for (const btn of menuButtons) {
    if (!btn.isSlider) continue;
    if (px >= btn.x && px <= btn.x + btn.w &&
        py >= btn.y && py <= btn.y + btn.h) {
      const tx = btn.trackX || btn.x;
      const tw = btn.trackW || btn.w;
      const pct = Math.max(0, Math.min(1, (px - tx) / tw));
      const val = btn.min + pct * (btn.max - btn.min);
      settings[btn.key] = Math.round(val * 100) / 100;
      applySettings();
      saveSettings();
      activeSlider = btn.key;
      return;
    }
  }
}
canvas.addEventListener('mousedown', (e) => { handleMenuPointer(e); });
canvas.addEventListener('mousemove', (e) => { if (e.buttons) handleMenuPointer(e); });
canvas.addEventListener('touchstart', (e) => { handleMenuPointer(e); }, { passive: true });
canvas.addEventListener('touchmove', (e) => { handleMenuPointer(e); }, { passive: true });

function skipDeathCinematic() {
  stopDeathRing();
  if (dyingRagdoll) {
    dyingRagdoll.alive = false;
    explodeRagdoll(dyingRagdoll);
    screenShake = 25;
  }
  if (ragdolls.every(r => !r.alive)) {
    triggerGameOver();
  } else {
    gameState = 'playing';
  }
  dyingRagdoll = null;
}

// --- Game Logic ---

function startIntro() {
  gameState = 'intro';
  introTimer = 0;
  introCameraY = 0;
  startWind();
  score = 0; bounceCount = 0; combo = 0; comboTimer = 0;
  baseGravity = MOBILE ? 0.2 : 0.25; gravity = baseGravity; scoreMultiplier = 1;
  trampoline.width = trampoline.defaultWidth; trampoline.init();
  ragdolls = []; powerups = []; activePowerups = []; particles = []; notifications = []; hazards = []; gibs = []; splatters = [];
  lastPowerupTime = frameCount; lastHazardTime = frameCount;

  // Create the ragdoll way above the trampoline — it will fall the whole way down
  const startY = trampoline.y - 6000;
  spawnRagdoll(canvas.width / 2, startY);

  // Clouds spread between the ragdoll start and the trampoline
  introClouds = [];
  for (let i = 0; i < 35; i++) {
    introClouds.push({
      x: Math.random() * canvas.width,
      y: startY + Math.random() * 6500,
      w: 80 + Math.random() * 200,
      h: 15 + Math.random() * 35,
      depth: 0.2 + Math.random() * 0.8,
    });
  }
}

function startGame() {
  gameState = 'playing';
  fadeOutWind();
  cloudFadeTimer = 30; // fade clouds over 30 frames
}

function triggerGameOver() {
  newPersonalBest = score > highScore && score > 0;
  if (score > highScore) {
    highScore = score;
    saveHighScore();
  }
  if (score > 0) addToLeaderboard(settings.username || 'Anonymous', score);
  gameState = 'gameover';
}

function restartGame() {
  newPersonalBest = false;
  startIntro();
}

let usingKeyboard = false;
function handleKeyboardInput() {
  const speed = 12;
  if (keys['ArrowLeft'] || keys['a'] || keys['A']) { trampoline.targetX -= speed; usingKeyboard = true; return; }
  if (keys['ArrowRight'] || keys['d'] || keys['D']) { trampoline.targetX += speed; usingKeyboard = true; return; }

  if (usingKeyboard) return; // don't snap to mouse after keyboard use

  if (controlMode === 'tilt' && tiltEnabled) {
    const adjusted = tiltGamma - tiltCalibration;
    const clampedTilt = Math.max(-35, Math.min(35, adjusted));
    const tiltFraction = (clampedTilt + 35) / 70;
    trampoline.targetX = tiltFraction * canvas.width;
  } else {
    trampoline.targetX = inputX || trampoline.x;
  }
}

// --- Drawing ---
function drawBackground() {
  ctx.fillStyle = '#fff';
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  // Floor line
  ctx.strokeStyle = '#000'; ctx.lineWidth = 1;
  ctx.setLineDash([6, 6]);
  ctx.beginPath(); ctx.moveTo(0, FLOOR_Y()); ctx.lineTo(canvas.width, FLOOR_Y()); ctx.stroke();
  ctx.setLineDash([]);
}

function drawVignette() {
  const vs = settings.vignetteStrength;
  if (vs <= 0) return;
  // Slowly grow base vignette with difficulty
  vignetteBase = Math.min(0.4, bounceCount * 0.003) * vs;
  // Decay the powerup spike toward the base
  vignetteIntensity = Math.max(vignetteBase, vignetteIntensity - 0.002);

  if (vignetteIntensity < 0.01) return;
  const finalV = vignetteIntensity * vs;
  const r = Math.max(canvas.width, canvas.height) * 0.85;
  const grad = ctx.createRadialGradient(
    canvas.width / 2, canvas.height / 2, r * 0.55,
    canvas.width / 2, canvas.height / 2, r
  );
  grad.addColorStop(0, 'rgba(0,0,0,0)');
  grad.addColorStop(1, `rgba(0,0,0,${Math.min(1, finalV)})`);
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, canvas.width, canvas.height);
}

function drawHUD() {
  // Left side: score, bounces, multiplier
  let leftY = 32;
  ctx.fillStyle = '#000'; ctx.font = 'bold 28px Gothica, monospace'; ctx.textAlign = 'left';
  ctx.fillText(`${score}`, 15, leftY);
  leftY += 20;
  ctx.font = '11px Gothica, monospace'; ctx.fillStyle = '#999';
  ctx.fillText(`BOUNCES: ${bounceCount}`, 15, leftY);
  if (scoreMultiplier > 1) {
    leftY += 16;
    ctx.fillStyle = '#000'; ctx.font = 'bold 12px Gothica, monospace';
    ctx.fillText(`${scoreMultiplier}x POINTS`, 15, leftY);
  }

  // Right side: high score, combo, alive — stacked with no overlap
  let rightY = 20;
  ctx.textAlign = 'right';
  if (highScore > 0) {
    ctx.fillStyle = '#999'; ctx.font = '11px Gothica, monospace';
    ctx.fillText(`BEST: ${highScore}`, canvas.width - 15, rightY);
    rightY += 18;
  }
  if (combo > 1 && comboTimer > 0) {
    ctx.globalAlpha = Math.min(1, comboTimer / 30);
    ctx.fillStyle = '#000';
    const comboSize = Math.min(32, 20 + combo * 2);
    ctx.font = `bold ${comboSize}px Gothica, monospace`;
    ctx.fillText(`${combo}x`, canvas.width - 15, rightY + comboSize - 6);
    rightY += comboSize + 4;
    ctx.globalAlpha = 1;
  }
  const alive = ragdolls.filter(r => r.alive).length;
  if (ragdolls.length > 1) {
    ctx.fillStyle = '#000'; ctx.font = '11px Gothica, monospace';
    ctx.fillText(`ALIVE: ${alive}/${ragdolls.length}`, canvas.width - 15, rightY + 12);
  }

  ctx.textAlign = 'center';
  // Active powerups below left HUD
  drawActivePowerups(leftY + 20);
}

// Draws a stickman centered at (dx, dy). Total height = sz * 4.
function drawStickmanPreview(dx, dy, sz, thickness) {
  const t = thickness || settings.thickness;
  const headY = dy - sz * 0.8;
  const neckY = headY + sz;
  const hipY = neckY + sz * 1.2;
  const footY = hipY + sz * 1.2;
  const armY = neckY + sz * 0.3;

  ctx.strokeStyle = '#000'; ctx.lineWidth = t; ctx.lineCap = 'round';
  ctx.fillStyle = '#000';
  // Head
  ctx.beginPath(); ctx.arc(dx, headY, sz * 0.7, 0, Math.PI * 2); ctx.fill();
  // Torso
  ctx.beginPath(); ctx.moveTo(dx, neckY); ctx.lineTo(dx, hipY); ctx.stroke();
  // Arms
  ctx.beginPath(); ctx.moveTo(dx - sz, armY); ctx.lineTo(dx, neckY); ctx.lineTo(dx + sz, armY); ctx.stroke();
  // Legs
  ctx.beginPath(); ctx.moveTo(dx - sz * 0.7, footY); ctx.lineTo(dx, hipY); ctx.lineTo(dx + sz * 0.7, footY); ctx.stroke();
  // Face
  const face = settings.faceStyle;
  const eyeR = sz * 0.08;
  const eyeOff = sz * 0.2;
  ctx.fillStyle = '#fff';
  if (face === 'dots' || face === 'happy' || face === 'angry') {
    ctx.beginPath(); ctx.arc(dx - eyeOff, headY, eyeR, 0, Math.PI * 2); ctx.fill();
    ctx.beginPath(); ctx.arc(dx + eyeOff, headY, eyeR, 0, Math.PI * 2); ctx.fill();
  }
  if (face === 'cool') {
    const gw = eyeR * 3, gh = eyeR * 1.5;
    ctx.fillRect(dx - eyeOff - gw/2, headY - gh/2, gw, gh);
    ctx.fillRect(dx + eyeOff - gw/2, headY - gh/2, gw, gh);
    ctx.strokeStyle = '#fff'; ctx.lineWidth = 1;
    ctx.beginPath(); ctx.moveTo(dx - eyeOff + gw/2, headY); ctx.lineTo(dx + eyeOff - gw/2, headY); ctx.stroke();
  }
  if (face === 'angry') {
    ctx.strokeStyle = '#fff'; ctx.lineWidth = 1;
    ctx.beginPath(); ctx.moveTo(dx - eyeOff - eyeR, headY - eyeR * 2); ctx.lineTo(dx - eyeOff + eyeR, headY - eyeR); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(dx + eyeOff + eyeR, headY - eyeR * 2); ctx.lineTo(dx + eyeOff - eyeR, headY - eyeR); ctx.stroke();
  }
  if (face === 'happy') {
    ctx.strokeStyle = '#fff'; ctx.lineWidth = 1;
    ctx.beginPath(); ctx.arc(dx, headY + eyeR * 2, eyeR * 1.5, 0.2, Math.PI - 0.2); ctx.stroke();
  }
}

function updateIntro() {
  introTimer++;
  const t = introTimer / INTRO_DURATION; // 0→1

  const r = ragdolls[0];
  const h = r.head;

  // Don't use normal physics for the head during intro — control it directly
  // Total distance to cover: from startY to trampoline.y - 150
  // Use a parametric curve: slow start, fast middle, decelerate at end
  const startY = trampoline.y - 6000;
  const endY = trampoline.y - 150;
  const totalDist = endY - startY;
  // Ease: slow-fast-slow (smoothstep-ish but weighted toward the end)
  const ease = t < 0.85 ? (t / 0.85) * (t / 0.85) * 0.7 : 0.7 + ((t - 0.85) / 0.15) * 0.3;
  const targetY = startY + totalDist * Math.min(1, ease);

  // Set head position and velocity (for verlet consistency)
  const prevY = h.y;
  h.y = targetY;
  h.oy = prevY; // velocity = h.y - h.oy = movement this frame
  h.x = canvas.width / 2 + Math.sin(t * 8) * 5 * (1 - t); // subtle wobble

  // Update body physics (not head — we just set it)
  for (const p of r.bodyPoints) p.update();
  for (let iter = 0; iter < SUBSTEPS; iter++) {
    const neck = r.bodyPoints[0];
    const dx = neck.x - h.x;
    const dy = neck.y - h.y;
    const dist = Math.hypot(dx, dy);
    if (dist > 0) {
      const diff = (r.neckRestLen - dist) / dist;
      neck.x += dx * diff;
      neck.y += dy * diff;
    }
    for (const [a, b, len] of r.links) {
      solveLink(a, b, len, 0.45);
    }
    for (const p of r.bodyPoints) {
      if (p.x < 5) { p.x = 5; p.ox = p.x; }
      if (p.x > canvas.width - 5) { p.x = canvas.width - 5; p.ox = p.x; }
    }
  }

  // Wind force on body parts — push limbs ABOVE the head so they trail upward
  const windStrength = 1.5 + t * 6;
  for (const p of r.bodyPoints) {
    // Push upward (decrease y relative to old position)
    p.y -= windStrength;
    // Horizontal flutter
    p.x += (Math.random() - 0.5) * 2;
  }
  // Keep neck pinned to head (no visible gap)
  const neckPt = r.bodyPoints[0];
  const ndx = neckPt.x - h.x;
  const ndy = neckPt.y - h.y;
  const ndist = Math.hypot(ndx, ndy);
  if (ndist > r.neckRestLen) {
    const nf = r.neckRestLen / ndist;
    neckPt.x = h.x + ndx * nf;
    neckPt.y = h.y + ndy * nf;
  }

  // Camera: track the head until 0.85, then blend to game camera (y=0)
  const headTrackY = h.y - canvas.height * 0.35;
  let cameraBlend = 0;
  if (t > 0.85) {
    const bt = (t - 0.85) / 0.15;
    cameraBlend = bt * bt * (3 - 2 * bt);
  }
  introCameraY = headTrackY * (1 - cameraBlend);

  // Camera shake — builds up, peaks around 70%, then fades
  const shakeCurve = t < 0.7 ? (t / 0.7) : (1 - (t - 0.7) / 0.3);
  const shakeAmount = shakeCurve * 10;
  const shakeX = (Math.random() - 0.5) * shakeAmount;
  const shakeY = (Math.random() - 0.5) * shakeAmount;

  ctx.save();
  ctx.translate(shakeX, shakeY);

  // White background
  ctx.fillStyle = '#fff';
  ctx.fillRect(-50, -50, canvas.width + 100, canvas.height + 100);

  // Clouds with parallax — drawn in screen space, scroll based on camera
  for (const c of introClouds) {
    const parallaxY = c.y - introCameraY * (0.5 + c.depth * 0.5);
    // Wrap into visible range
    const range = canvas.height + 400;
    let screenY = ((parallaxY % range) + range) % range - 200;

    const alpha = 0.04 + c.depth * 0.06;
    ctx.fillStyle = `rgba(0,0,0,${alpha})`;

    ctx.beginPath();
    ctx.ellipse(c.x, screenY, c.w / 2, c.h / 2, 0, 0, Math.PI * 2);
    ctx.fill();
    ctx.beginPath();
    ctx.ellipse(c.x - c.w * 0.28, screenY + 3, c.w * 0.32, c.h * 0.45, 0, 0, Math.PI * 2);
    ctx.fill();
    ctx.beginPath();
    ctx.ellipse(c.x + c.w * 0.28, screenY + 3, c.w * 0.32, c.h * 0.45, 0, 0, Math.PI * 2);
    ctx.fill();
  }

  // Speed lines — vertical streaks that rush upward
  const lineAlpha = Math.min(0.12, t * 0.15);
  ctx.strokeStyle = `rgba(0,0,0,${lineAlpha})`; ctx.lineWidth = 1.5;
  for (let i = 0; i < 20; i++) {
    const lx = ((i * 137.5 + 23) % canvas.width);
    const speed = 6 + t * 25;
    const ly = ((i * 197.3 - introTimer * speed) % (canvas.height + 200) + canvas.height + 200) % (canvas.height + 200) - 100;
    const len = 20 + t * 60;
    ctx.beginPath();
    ctx.moveTo(lx, ly);
    ctx.lineTo(lx, ly - len); // lines streak upward
    ctx.stroke();
  }

  // Transform to world space for ragdoll + trampoline
  ctx.save();
  ctx.translate(0, -introCameraY);

  // Always draw trampoline + floor (they'll be off-screen until camera gets close)
  trampoline.draw();
  ctx.strokeStyle = '#000'; ctx.lineWidth = 1;
  ctx.setLineDash([6, 6]);
  ctx.beginPath(); ctx.moveTo(0, FLOOR_Y()); ctx.lineTo(canvas.width, FLOOR_Y()); ctx.stroke();
  ctx.setLineDash([]);

  // Draw ragdoll in world space
  drawRagdoll(r);

  ctx.restore(); // world space
  ctx.restore(); // shake

  // Countdown overlay
  ctx.fillStyle = '#000'; ctx.textAlign = 'center';
  if (t < 0.28) {
    ctx.globalAlpha = Math.min(1, t / 0.06);
    ctx.font = 'bold 60px Gothica, monospace';
    ctx.fillText('3', canvas.width / 2, canvas.height * 0.7);
  } else if (t < 0.48) {
    ctx.font = 'bold 60px Gothica, monospace';
    ctx.fillText('2', canvas.width / 2, canvas.height * 0.7);
  } else if (t < 0.68) {
    ctx.font = 'bold 60px Gothica, monospace';
    ctx.fillText('1', canvas.width / 2, canvas.height * 0.7);
  } else if (t < 0.9) {
    ctx.font = 'bold 44px Gothica, monospace';
    ctx.fillText('BOUNCE!', canvas.width / 2, canvas.height * 0.7);
  }
  ctx.globalAlpha = 1;

  // Let the ball bounce off trampoline if it reaches it
  checkBounce(r);

  // End intro when timer is done — no teleport, ragdoll is already in the right place
  if (introTimer >= INTRO_DURATION) {
    startGame();
  }
}

function getWorldRank(sc) {
  if (leaderboard.length === 0) return 1;
  let rank = 1;
  for (const e of leaderboard) {
    if (sc >= e.score) return rank;
    rank++;
  }
  return rank;
}

function drawGameOver() {
  menuButtons = [];
  ctx.fillStyle = 'rgba(255,255,255,0.85)'; ctx.fillRect(0, 0, canvas.width, canvas.height);
  const cx = canvas.width / 2;
  const cy = canvas.height / 2;
  ctx.textAlign = 'center';
  ctx.fillStyle = '#000'; ctx.font = `bold ${MOBILE ? 36 : 48}px Gothica, monospace`;
  ctx.fillText('GAME OVER', cx, cy - 70);
  ctx.font = 'bold 32px Gothica, monospace';
  ctx.fillText(`${score}`, cx, cy - 25);
  ctx.font = '14px Gothica, monospace'; ctx.fillStyle = '#999';
  ctx.fillText(`${bounceCount} bounces`, cx, cy + 2);

  // World rank
  const rank = onlineRank || getWorldRank(score);
  ctx.fillStyle = '#555'; ctx.font = '16px Gothica, monospace';
  ctx.fillText(`#${rank} worldwide`, cx, cy + 28);

  if (newPersonalBest) {
    ctx.fillStyle = '#e94560'; ctx.font = 'bold 18px Gothica, monospace';
    ctx.fillText('NEW PERSONAL BEST!', cx, cy + 58);
    addButtonOutline('SHARE', cx, cy + 95, 140, 38, () => { shareScore(score); });
  }

  const btnY = newPersonalBest ? cy + 150 : cy + 85;
  addButton('RETRY', cx, btnY, 160, 44, () => { restartGame(); });
  addButtonOutline('MENU', cx, btnY + 55, 120, 36, () => {
    gameState = 'menu'; menuState = 'main'; newPersonalBest = false;
  });
}

// --- Death Cinematic ---
function updateDeathCinematic() {
  deathTimer++;
  const t = deathTimer;

  const r = dyingRagdoll;
  const h = r.head;
  const buildupT = Math.min(1, t / DEATH_BUILDUP);

  // Rising ringing tone during buildup
  if (t === 1) startDeathRing();
  if (t < DEATH_BUILDUP) {
    updateDeathRing(buildupT);
  } else if (t === DEATH_BUILDUP) {
    stopDeathRing();
  }

  // Zoom: 1 → 2.2 during buildup, snap back after explosion
  const zoomEase = buildupT * buildupT;
  const zoom = t < DEATH_BUILDUP ? 1 + zoomEase * 1.2 :
               t < DEATH_BUILDUP + DEATH_EXPLODE ? 2.2 - ((t - DEATH_BUILDUP) / DEATH_EXPLODE) * 1.2 : 1;

  // Shake
  let shake = 0;
  if (t < DEATH_BUILDUP) {
    const late = buildupT > 0.7 ? ((buildupT - 0.7) / 0.3) : 0;
    shake = buildupT * 4 + late * late * 25;
  } else if (t < DEATH_BUILDUP + DEATH_EXPLODE) {
    shake = 40 * (1 - (t - DEATH_BUILDUP) / DEATH_EXPLODE);
  } else {
    shake = 4 * Math.max(0, 1 - (t - DEATH_BUILDUP - DEATH_EXPLODE) / DEATH_LINGER);
  }
  const sx = (Math.random() - 0.5) * shake;
  const sy = (Math.random() - 0.5) * shake;

  // Vibrate the stickman during buildup
  if (t < DEATH_BUILDUP) {
    const vib = buildupT * buildupT * 14;
    h.x = deathX + (Math.random() - 0.5) * vib;
    h.y = deathY + (Math.random() - 0.5) * vib;
    for (const p of r.bodyPoints) {
      p.x += (Math.random() - 0.5) * vib * 0.5;
      p.y += (Math.random() - 0.5) * vib * 0.5;
    }
  }

  // --- All drawing uses a single transform: zoom centered on deathX/deathY ---
  ctx.save();
  ctx.translate(canvas.width / 2 + sx, canvas.height / 2 + sy);
  ctx.scale(zoom, zoom);
  ctx.translate(-(canvas.width / 2 + (deathX - canvas.width / 2) * (zoom > 1 ? 1 : 0)),
                -(canvas.height / 2 + (deathY - canvas.height / 2) * (zoom > 1 ? 1 : 0)));

  // Nope — simpler. Reset and do it cleanly:
  ctx.restore();
  ctx.save();

  // Step 1: translate so deathX,deathY is at origin
  // Step 2: scale
  // Step 3: translate back, plus shake
  ctx.translate(sx, sy);
  ctx.translate(deathX, deathY);
  ctx.scale(zoom, zoom);
  ctx.translate(-deathX, -deathY);

  // Now everything draws in normal screen coordinates, but zoomed toward deathX/deathY

  // White fill (oversized for zoom)
  ctx.fillStyle = '#fff';
  ctx.fillRect(-canvas.width, -canvas.height, canvas.width * 3, canvas.height * 3);
  drawBackground();
  trampoline.draw();
  drawSplatters();

  for (const rd of ragdolls) {
    if (rd === r) continue;
    drawRagdoll(rd);
  }

  // Darken
  const darkness = t < DEATH_BUILDUP ? buildupT * 0.7 :
                   t < DEATH_BUILDUP + DEATH_EXPLODE ? 0.7 :
                   0.7 * Math.max(0, 1 - (t - DEATH_BUILDUP - DEATH_EXPLODE) / DEATH_LINGER * 0.6);
  ctx.fillStyle = `rgba(0,0,0,${darkness})`;
  ctx.fillRect(-canvas.width, -canvas.height, canvas.width * 3, canvas.height * 3);

  if (t < DEATH_BUILDUP) {
    // --- BUILDUP ---
    drawRagdoll(r);

    // Glow on body
    const glowSize = 10 + buildupT * 50 + Math.sin(t * 0.3) * 8;
    ctx.shadowColor = '#fff';
    ctx.shadowBlur = glowSize;
    ctx.lineCap = 'round';
    const ga = 0.1 + buildupT * 0.7;
    ctx.strokeStyle = `rgba(255,255,255,${ga})`;
    ctx.lineWidth = 2 + buildupT * 6;
    for (const [a, b] of r.drawLinks) {
      ctx.beginPath(); ctx.moveTo(a.x, a.y); ctx.lineTo(b.x, b.y); ctx.stroke();
    }
    ctx.beginPath(); ctx.moveTo(h.x, h.y); ctx.lineTo(r.bodyPoints[0].x, r.bodyPoints[0].y); ctx.stroke();
    ctx.beginPath(); ctx.arc(h.x, h.y, h.radius + buildupT * 8, 0, Math.PI * 2); ctx.stroke();

    // Staged light streaks from the HEAD position
    const angles = [0.3, 2.8, 1.2, 4.5, 0.8, 3.7, 5.2, 1.8, 4.0, 2.2, 5.8, 0.1, 3.2, 1.5, 4.8, 2.5, 5.5, 0.6, 3.5, 1.0];
    let count = 0, len = 40, sa = 0.5, sw = 2;

    if (buildupT < 0.2) {
      count = 1; const f = buildupT / 0.2;
      sa = f * 0.6; len = 30 + f * 40; sw = 2 + f;
    } else if (buildupT < 0.38) {
      count = 2; sa = 0.6; len = 60; sw = 3;
    } else if (buildupT < 0.65) {
      const p = (buildupT - 0.38) / 0.27;
      count = 2 + Math.floor(p * 5); sa = 0.6 + p * 0.2; len = 60 + p * 40; sw = 3 + p;
    } else {
      const p = (buildupT - 0.65) / 0.35;
      const e = p * p;
      count = 7 + Math.floor(e * 13); sa = 0.8 + e * 0.2; len = 100 + e * 80; sw = 4 + e * 3;
    }

    for (let i = 0; i < count && i < angles.length; i++) {
      const a = angles[i] + Math.sin(t * 0.02 + i) * 0.1;
      const l = len + Math.sin(t * 0.4 + i * 2.3) * 20;
      const ir = h.radius + 10;
      ctx.strokeStyle = `rgba(255,255,255,${sa})`;
      ctx.lineWidth = sw;
      ctx.beginPath();
      ctx.moveTo(h.x + Math.cos(a) * ir, h.y + Math.sin(a) * ir);
      ctx.lineTo(h.x + Math.cos(a) * (ir + l), h.y + Math.sin(a) * (ir + l));
      ctx.stroke();
    }
    ctx.shadowBlur = 0;

  } else if (t < DEATH_BUILDUP + DEATH_EXPLODE) {
    const et = (t - DEATH_BUILDUP) / DEATH_EXPLODE;
    if (t === DEATH_BUILDUP + 1) {
      r.alive = false;
      explodeRagdoll(r);
      for (let i = 0; i < 50; i++) {
        const a = Math.random() * Math.PI * 2;
        const sp = 1 + Math.random() * 12;
        particles.push({
          x: deathX + (Math.random() - 0.5) * 30,
          y: deathY + (Math.random() - 0.5) * 30,
          vx: Math.cos(a) * sp, vy: Math.sin(a) * sp - 3,
          life: 2.5, color: '#000', size: 6 + Math.random() * 14, sludge: true,
        });
      }
    }
    // Flash
    const fa = Math.max(0, 1 - et * 2);
    ctx.fillStyle = `rgba(255,255,255,${fa})`;
    ctx.fillRect(-canvas.width, -canvas.height, canvas.width * 3, canvas.height * 3);
    updateGibs(); drawGibs();
    updateParticles(); drawParticles();

  } else {
    updateGibs(); drawGibs();
    updateParticles(); drawParticles();
  }

  ctx.restore();

  // Skip hint (screen space)
  if (t > 30 && t < DEATH_TOTAL - 10) {
    ctx.globalAlpha = 0.35;
    ctx.fillStyle = '#fff'; ctx.font = '12px Gothica, monospace'; ctx.textAlign = 'center';
    ctx.fillText('click to skip', canvas.width / 2, canvas.height - 25);
    ctx.globalAlpha = 1;
  }
  drawHUD();

  if (t >= DEATH_TOTAL) {
    if (ragdolls.every(rd => !rd.alive)) {
      triggerGameOver();
    } else {
      gameState = 'playing';
    }
    dyingRagdoll = null;
  }
}

// --- Main Loop ---
function update() {
  frameCount++;

  if (gameState === 'menu') {
    drawMenu();
    requestAnimationFrame(update);
    return;
  }

  if (gameState === 'intro') {
    updateIntro();
    requestAnimationFrame(update);
    return;
  }

  if (gameState === 'dying') {
    updateDeathCinematic();
    requestAnimationFrame(update);
    return;
  }

  // Playing or gameover
  let shakeX = 0, shakeY = 0;
  if (screenShake > 0) {
    shakeX = (Math.random() - 0.5) * screenShake;
    shakeY = (Math.random() - 0.5) * screenShake;
    screenShake *= 0.85;
    if (screenShake < 0.5) screenShake = 0;
  }
  ctx.save();
  ctx.translate(shakeX, shakeY);
  ctx.clearRect(-10, -10, canvas.width + 20, canvas.height + 20);
  drawBackground();

  // Fade out intro clouds when game starts
  if (cloudFadeTimer > 0) {
    cloudFadeTimer--;
    const fadeAlpha = cloudFadeTimer / 30;
    ctx.globalAlpha = fadeAlpha;
    for (const c of introClouds) {
      const alpha = 0.04 + c.depth * 0.06;
      ctx.fillStyle = `rgba(0,0,0,${alpha})`;
      ctx.beginPath();
      ctx.ellipse(c.x, c.y, c.w / 2, c.h / 2, 0, 0, Math.PI * 2);
      ctx.fill();
      ctx.beginPath();
      ctx.ellipse(c.x - c.w * 0.28, c.y + 3, c.w * 0.32, c.h * 0.45, 0, 0, Math.PI * 2);
      ctx.fill();
      ctx.beginPath();
      ctx.ellipse(c.x + c.w * 0.28, c.y + 3, c.w * 0.32, c.h * 0.45, 0, 0, Math.PI * 2);
      ctx.fill();
    }
    ctx.globalAlpha = 1;
    if (cloudFadeTimer <= 0) introClouds = [];
  }

  handleKeyboardInput();
  trampoline.update();
  trampoline.draw();

  if (comboTimer > 0) { comboTimer--; if (comboTimer <= 0) combo = 0; }

  if (gameState === 'playing') {
    updatePowerups();
    updateHazards();
    for (const r of ragdolls) {
      updateRagdoll(r);
      checkBounce(r);
      checkDeath(r);
    }
    resolveRagdollCollisions();
    if (ragdolls.every(r => !r.alive)) {
      triggerGameOver();
    }
  }

  drawSplatters();
  drawPowerups();
  drawHazards();
  for (const r of ragdolls) drawRagdoll(r);
  updateGibs(); drawGibs();
  updateParticles(); drawParticles();
  updateNotifications(); drawNotifications();
  drawVignette();
  drawHUD();
  if (gameState === 'gameover') drawGameOver();

  ctx.restore();
  requestAnimationFrame(update);
}

// Init
trampoline.init();
inputX = canvas.width / 2;
gameReady = true;
update();

// Register service worker for PWA / installable app
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('./sw.js').catch(() => {});
}
</script>
